name: Build and Deploy Extension

on:
  push:
    branches:
      - master
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Plugins
        run: ./gradlew make

      - name: Prepare deployment folder
        run: |
          mkdir deploy
          # Copy the generated JSON manifest (It will be named CNCVerse.json)
          cp *.json deploy/ || true
          # Copy all compiled .cs3 plugins while keeping their required folder structure
          find . -name "*.cs3" -exec cp --parents {} deploy/ \;

      - name: Deploy to builds branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy
          publish_branch: builds
          force_orphan: true