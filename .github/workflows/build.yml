name: Build and Deploy Extension

on:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build and Deploy CloudStream Repository
        uses: recloudstream/extension-builder@master
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}