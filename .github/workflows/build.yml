name: Build and Deploy

on:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build Plugins
        run: |
          chmod +x gradlew
          ./gradlew make

      - name: Prepare Deployment
        run: |
          # 1. Create a clean folder for deployment
          mkdir deploy_folder
          
          # 2. Copy the .cs3 files while preserving their exact folder paths
          find . -type f -name "*.cs3" -exec cp --parents {} deploy_folder/ \;
          
          # 3. Grab the JSON manifest from the build folder and place it at the root of our deployment
          cp build/*.json deploy_folder/CNCVerse.json

      - name: Deploy to builds branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy_folder
          publish_branch: builds
          force_orphan: true